="10.8" font-weight="600" text-anchor="middle" dominant-baseline="central">cache</text><rect x="1041.9" y="271.5" width="56.2" height="18" rx="9" ry="9" fill="#ffffff" stroke="#dde2e7" stroke-width="1"></rect><text x="1070" y="281" fill="#27313a" font-size="10.8" font-weight="600" text-anchor="middle" dominant-baseline="central">weights</text></g><defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="1.1" flood-color="#000" flood-opacity="0.13"></feDropShadow></filter></defs><g class="dgm-legend"><path d="M16,486 L1224,486" stroke="#dde2e7" stroke-width="1" fill="none"></path><rect class="dgm-leg" x="24" y="499" width="13" height="13" rx="3" ry="3" fill="#0078D4"></rect><text x="43" y="505" fill="#27313a" font-size="10.5" font-weight="600" dominant-baseline="central">service</text><rect class="dgm-leg" x="196.57142857142858" y="499" width="13" height="13" rx="3" ry="3" fill="#0C8599"></rect><text x="215.57142857142858" y="505" fill="#27313a" font-size="10.5" font-weight="600" dominant-baseline="central">datastore</text><rect class="dgm-leg" x="369.14285714285717" y="499" width="13" height="13" rx="3" ry="3" fill="#F7630C"></rect><text x="388.14285714285717" y="505" fill="#27313a" font-size="10.5" font-weight="600" dominant-baseline="central">queue</text><rect class="dgm-leg" x="541.7142857142858" y="499" width="13" height="13" rx="3" ry="3" fill="#2f9e44"></rect><text x="560.7142857142858" y="505" fill="#27313a" font-size="10.5" font-weight="600" dominant-baseline="central">external</text><rect class="dgm-leg" x="714.2857142857143" y="499" width="13" height="13" rx="3" ry="3" fill="#4f46e5"></rect><text x="733.2857142857143" y="505" fill="#27313a" font-size="10.5" font-weight="600" dominant-baseline="central">gateway</text><path d="M886.8571428571429,505 L908.8571428571429,505" stroke="#55606a" stroke-width="1.9" fill="none"></path><polygon points="908.8571428571429,505 902.8571428571429,502 902.8571428571429,508