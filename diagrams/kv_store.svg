="central">Anti-Entropy</text><text x="792" y="245" fill="#3c454d" font-size="10.8" text-anchor="middle" dominant-baseline="central">Merkle · read-repair · hinted handoff</text><rect x="300" y="339" width="300" height="66" rx="9" ry="9" fill="#fff" stroke="#0F5BB5" stroke-width="1.7" filter="url(#sh)"></rect><path d="M300,365 V348 Q300,339 309,339 H591 Q600,339 600,348 V365 Z" fill="#0078D4"></path><text x="450" y="352.5" fill="#fff" font-weight="700" font-size="12.5" text-anchor="middle" dominant-baseline="central">Quorum R/W</text><text x="450" y="385" fill="#3c454d" font-size="10.8" text-anchor="middle" dominant-baseline="central">W + R &gt; N · tunable</text><rect x="300" y="523" width="300" height="66" rx="9" ry="9" fill="#fff" stroke="#0A6E80" stroke-width="1.7" filter="url(#sh)"></rect><path d="M300,549 V532 Q300,523 309,523 H591 Q600,523 600,532 V549 Z" fill="#0C8599"></path><text x="450" y="536.5" fill="#fff" font-weight="700" font-size="12.5" text-anchor="middle" dominant-baseline="central">Replicas (N)</text><text x="450" y="569" fill="#3c454d" font-size="10.8" text-anchor="middle" dominant-baseline="central">replication factor N</text><rect x="300" y="655" width="300" height="66" rx="9" ry="9" fill="#fff" stroke="#0A6E80" stroke-width="1.7" filter="url(#sh)"></rect><path d="M300,681 V664 Q300,655 309,655 H591 Q600,655 600,664 V681 Z" fill="#0C8599"></path><text x="450" y="668.5" fill="#fff" font-weight="700" font-size="12.5" text-anchor="middle" dominant-baseline="central">Version Vectors</text><text x="450" y="701" fill="#3c454d" font-size="10.8" text-anchor="middle" dominant-baseline="central">conflict siblings</text><rect x="685" y="464" width="340" height="72" rx="9" ry="9" fill="#fff" stroke="#6c757d" stroke-width="1.7" filter="url(#sh)"></rect><path d="M685,490 V473 Q685,464 694,464 H1016 Q1025,464 1025,473 V490 Z" fill="#6c757d"></path><text x="855" y="477.5" fill="#fff" font-weight="700" font-size="12.5" text-anchor="middle" dominant-baseline="central">Quorum: N=3, W=2, R=2</text><text x="855" y="513" fill="#3c454d" font-size="10.8" text-anchor="middle" dominant-baseline="central">W + R &gt; N ⇒ overlap ⇒ read sees latest write</text></g><g><rect x="369.8" y="132.5" width="160.39999999999998" height="18" rx="9" ry="9" fill="#ffffff" stroke="#dde2e7" stroke-width="1"></rect><text x="450" y="142" fill="#27313a" font-size="10.8" font-weight="600" text-anchor="middle" dominant-baseline="central">① put(k,v) → coordinator</text><rect x="385.05" y="294" width="129.89999999999998" height="18" rx="9" ry="9" fill="#ffffff" stroke="#dde2e7" stroke-width="1"></rect><text x="450" y="303.5" fill="#27313a" font-size="10.8" font-weight="600" text-anchor="middle" dominant-baseline="central">② hash → N replicas</text><rect x="382" y="455" width="136" height="18" rx="9" ry="9" fill="#ffffff" stroke="#dde2e7" stroke-width="1"></rect><text x="450" y="464.5" fill="#27313a" font-size="10.8" font-weight="600" text-anchor="middle" dominant-baseline="central">③ write W · ④ read R</text><rect x="369.8" y="613" width="160.39999999999998" height="18" rx="9" ry="9" fill="#ffffff" stroke="#dde2e7" stroke-width="1"></rect><text x="450" y="622.5" fill="#27313a" font-size="10.8" font-weight="600" text-anchor="middle" dominant-baseline="central">⑤ siblings + read-repair</text><rect x="610.3" y="385" width="99.39999999999999" height="18" rx="9" ry="9" fill="#ffffff" stroke="#dde2e7" stroke-width="1"></rect><text x="660" y="394.5" fill="#27313a" font-size="10.8" font-weight="600" text-anchor="middle" dominant-baseline="central">hinted handoff</text></g><defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="1.1" flood-color="#000" flood-opacity="0.13"></feDropShadow></filter></defs></svg>