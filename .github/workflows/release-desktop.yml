name: Build & publish desktop app

# Triggers on either:
#   • a tag push matching `desktop-vX.Y.Z` (the normal release flow), or
#   • a manual run from the Actions tab (lets us re-publish or test).
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

# electron-builder needs to create a GitHub Release and upload the .exe +
# latest.yml to it, which requires write access to repo contents.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build & publish to GitHub Releases
        working-directory: desktop
        env:
          # electron-builder reads GH_TOKEN to authenticate against the
          # GitHub Releases API. GITHUB_TOKEN is auto-provisioned by Actions
          # and has enough scope for releases in this same repo.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
