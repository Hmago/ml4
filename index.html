<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a56db">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ML Notes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>ML Study Notes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css" id="hljs-theme" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1 style="cursor:pointer;" onclick="renderWelcome();closeSidebar();">ML Study Notes</h1>
    <p id="chapter-count"></p>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search all notes... (Ctrl+K)" autocomplete="off">
  </div>
  <div class="search-results" id="searchResults"></div>
  <div class="chapter-list" id="chapterList"></div>
  <div class="sidebar-nav-btns">
    <button onclick="showDashboard()" title="Progress & Settings">📊 Dashboard</button>
    <button onclick="showDSAPractice()" title="DSA Coding Practice">💻 DSA Practice</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <span class="breadcrumb" id="breadcrumb">Select a chapter</span>
    </div>
    <div class="topbar-right">
      <button class="hide-mobile" onclick="changeFontSize(-1)" title="Smaller text">A-</button>
      <button class="hide-mobile" onclick="changeFontSize(1)" title="Larger text">A+</button>
      <button onclick="openFind()" id="findBtn" title="Find in chapter (Ctrl+F)" style="display:none;">&#128269; Find</button>
      <button onclick="toggleFocusMode()" id="focusBtn" title="Focus mode (F)" style="display:none;">&#9678; Focus</button>
      <button onclick="toggleTTS()" id="ttsBtn" title="Listen to chapter" style="display:none;">&#9655; Listen</button>
      <button onclick="toggleReadStatus()" id="readBtn" title="Mark as read">&#10003; Read</button>
      <button onclick="toggleTheme()" id="themeBtn" title="Toggle dark mode">&#9790;</button>
    </div>
  </div>
  <div class="content-wrapper" id="contentWrapper">
    <div class="content" id="content">
      <div id="welcomeSlot"></div>
    </div>
  </div>
</main>

<div class="tts-player" id="ttsPlayer">
  <div class="tts-player-inner">
    <button class="tts-ctrl" onclick="ttsBack()" title="Previous paragraph">&#9664;&#9664;</button>
    <button class="tts-ctrl tts-play" onclick="ttsPlayPause()" id="ttsPlayBtn" title="Play/Pause">&#9655;</button>
    <button class="tts-ctrl" onclick="ttsForward()" title="Next paragraph">&#9654;&#9654;</button>
    <button class="tts-ctrl" onclick="ttsStop()" title="Stop">&#9632;</button>
    <div class="tts-progress">
      <div class="tts-progress-fill" id="ttsProgressFill"></div>
    </div>
    <span class="tts-counter" id="ttsCounter">0/0</span>
    <select class="tts-speed" id="ttsSpeed" onchange="ttsSetSpeed(this.value)" title="Speed">
      <option value="0.75">0.75x</option>
      <option value="1" selected>1x</option>
      <option value="1.25">1.25x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
  </div>
</div>

<div class="sel-popup" id="selPopup">
  <button class="sp-note" onclick="noteFromSelection()">💬 Note</button>
  <button class="sp-hl" onclick="highlightSelection()">🖍 Highlight</button>
  <button class="sp-copy" onclick="copySelection()">📋 Copy</button>
</div>
<div class="find-bar" id="findBar" role="search" aria-label="Find in chapter">
  <input type="text" id="findInput" placeholder="Find in chapter&hellip;" autocomplete="off" spellcheck="false" aria-label="Find in chapter">
  <span class="find-count" id="findCount">0/0</span>
  <span class="find-divider"></span>
  <button class="find-btn" id="findPrev" onclick="findNavigate(-1)" title="Previous match (Shift+Enter)" aria-label="Previous match">&#8593;</button>
  <button class="find-btn" id="findNext" onclick="findNavigate(1)" title="Next match (Enter)" aria-label="Next match">&#8595;</button>
  <button class="find-btn find-close" id="findClose" onclick="closeFind()" title="Close (Esc)" aria-label="Close find">&#10005;</button>
</div>
<div class="focus-bar" id="focusBar">
  <span class="focus-bar-title" id="focusBarTitle"></span>
  <div class="focus-bar-actions">
    <button onclick="changeFontSize(-1)" title="Smaller text">A-</button>
    <button onclick="changeFontSize(1)" title="Larger text">A+</button>
    <button onclick="toggleTheme()" title="Toggle dark mode">&#9790;</button>
    <button onclick="toggleFocusMode()" title="Exit focus mode (Esc)">&#10005; Exit</button>
  </div>
</div>
<canvas id="confetti-canvas"></canvas>
<aside class="toc-panel" id="tocPanel">
  <h3>On this page</h3>
  <div id="tocLinks"></div>
</aside>

<!-- Core libs needed for the reader. `defer` lets the HTML shell paint without
     blocking on script download/parse; execution order is preserved. -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js" integrity="sha384-3zf4Pen4fXU90jGg3cxmo7BF4dq8HMtF2s07c/Hhd1Fh+Encm6ApPvNm8vrMJbWu" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js" integrity="sha384-uUg+ux8epe42611RSvEkMX2gvEkMdw+l6xG5Z/aQriABp38RLyF9MjDZtlTlMuQY" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js" integrity="sha384-FWJTgPmIGm1+zpNhubuHRC/ulS1UK7hAZ7qiUUmKD8yGfPcn5ZXYBd2qRgi6L8Tu" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js" integrity="sha384-8q00eP+tyV9451aJYD5ML3ftuHKsGnDcezp7EXMEclDg1fZVSoj8O+3VyJTkXmWp" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js" integrity="sha384-RbRhXcXx5VHUdUaC5R0oV+XBXA5GhkaVCUzK8xN19K3FmtWSHyGVgulK92XnhBsI" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/markdown.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<!-- mermaid (~2.7MB) and chart.js are lazy-loaded on demand by chapter.js
     (ensureMermaid / ensureChart) — only the few chapters with diagrams/charts pay the cost. -->
<!-- quizzes.js (225KB) is lazy-loaded on first quiz (chapter.js ensureQuizData);
     DSA index (420KB) is lazy-loaded on first DSA view / welcome stats (dsa.js ensureDsaIndex). -->
<!-- App modules — load order matters (state defines globals used by later files). -->
<script defer src="js/state.js"></script>
<script defer src="js/chapter.js"></script>
<script defer src="js/pages.js"></script>
<script defer src="js/dsa.js"></script>
<script defer src="js/pins.js"></script>
<script defer src="js/init.js"></script>
</body>
</html>
