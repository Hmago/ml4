<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ML Notes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>ML Study Notes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme" integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1 style="cursor:pointer;" onclick="renderWelcome();closeSidebar();">ML Study Notes</h1>
    <p id="chapter-count"></p>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search all notes... (Ctrl+K)" autocomplete="off">
  </div>
  <div class="search-results" id="searchResults"></div>
  <div class="chapter-list" id="chapterList"></div>
  <div class="sidebar-nav-btns">
    <button onclick="showDashboard()" title="Progress & Settings">📊 Dashboard</button>
    <button onclick="showDSAPractice()" title="DSA Coding Practice">💻 DSA Practice</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <span class="breadcrumb" id="breadcrumb">Select a chapter</span>
    </div>
    <div class="topbar-right">
      <div class="study-timer hide-mobile" id="studyTimer" onclick="toggleStudyTimer()" title="Click to start/stop study timer">
        <span class="timer-dot"></span>
        <span id="timerDisplay">▶ Start</span>
      </div>
      <button class="hide-mobile" onclick="changeFontSize(-1)" title="Smaller text">A-</button>
      <button class="hide-mobile" onclick="changeFontSize(1)" title="Larger text">A+</button>
      <button onclick="toggleReadStatus()" id="readBtn" title="Mark as read">&#10003; Read</button>
      <button onclick="toggleTheme()" id="themeBtn" title="Toggle dark mode">&#9790;</button>
    </div>
  </div>
  <div class="content-wrapper" id="contentWrapper">
    <div class="content" id="content">
      <div id="welcomeSlot"></div>
    </div>
  </div>
</main>

<div class="sel-popup" id="selPopup">
  <button class="sp-note" onclick="noteFromSelection()">💬 Note</button>
  <button class="sp-hl" onclick="highlightSelection()">🖍 Highlight</button>
  <button class="sp-copy" onclick="copySelection()">📋 Copy</button>
</div>
<canvas id="confetti-canvas"></canvas>
<aside class="toc-panel" id="tocPanel">
  <h3>On this page</h3>
  <div id="tocLinks"></div>
</aside>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js" integrity="sha384-3zf4Pen4fXU90jGg3cxmo7BF4dq8HMtF2s07c/Hhd1Fh+Encm6ApPvNm8vrMJbWu" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js" integrity="sha384-uUg+ux8epe42611RSvEkMX2gvEkMdw+l6xG5Z/aQriABp38RLyF9MjDZtlTlMuQY" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js" integrity="sha384-FWJTgPmIGm1+zpNhubuHRC/ulS1UK7hAZ7qiUUmKD8yGfPcn5ZXYBd2qRgi6L8Tu" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js" integrity="sha384-8q00eP+tyV9451aJYD5ML3ftuHKsGnDcezp7EXMEclDg1fZVSoj8O+3VyJTkXmWp" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js" integrity="sha384-RbRhXcXx5VHUdUaC5R0oV+XBXA5GhkaVCUzK8xN19K3FmtWSHyGVgulK92XnhBsI" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js" integrity="sha384-6F4Ibv/ylL12O35KFWTeGTHuBKDz5L6yjKsgv3QHQ8s4NTqlDXq7kMlYXGs7MHFc" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="js/data/quizzes.js"></script>
<!-- DSA split: metadata loads synchronously; starter code is lazy-loaded on first problem open (see dsa.js ensureDsaFullData). -->
<script src="js/data/dsa_problems_index.js"></script>
<!-- App modules — load order matters (state defines globals used by later files) -->
<script src="js/state.js"></script>
<script src="js/chapter.js"></script>
<script src="js/pages.js"></script>
<script src="js/dsa.js"></script>
<script src="js/pins.js"></script>
<script src="js/init.js"></script>
</body>
</html>
