<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ML Notes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>ML Study Notes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1 style="cursor:pointer;" onclick="renderWelcome();closeSidebar();">ML Study Notes</h1>
    <p id="chapter-count"></p>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search all notes... (Ctrl+K)" autocomplete="off">
  </div>
  <div class="search-results" id="searchResults"></div>
  <div class="chapter-list" id="chapterList"></div>
  <div class="sidebar-nav-btns">
    <button onclick="showDashboard()" title="Progress & Settings">📊 Dashboard</button>
    <button onclick="showDSAPractice()" title="DSA Coding Practice">💻 DSA Practice</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <span class="breadcrumb" id="breadcrumb">Select a chapter</span>
    </div>
    <div class="topbar-right">
      <div class="study-timer hide-mobile" id="studyTimer" onclick="toggleStudyTimer()" title="Click to start/stop study timer">
        <span class="timer-dot"></span>
        <span id="timerDisplay">▶ Start</span>
      </div>
      <button class="hide-mobile" onclick="changeFontSize(-1)" title="Smaller text">A-</button>
      <button class="hide-mobile" onclick="changeFontSize(1)" title="Larger text">A+</button>
      <button onclick="toggleReadStatus()" id="readBtn" title="Mark as read">&#10003; Read</button>
      <button onclick="toggleTheme()" id="themeBtn" title="Toggle dark mode">&#9790;</button>
    </div>
  </div>
  <div class="content-wrapper" id="contentWrapper">
    <div class="content" id="content">
      <div id="welcomeSlot"></div>
    </div>
  </div>
</main>

<div class="sel-popup" id="selPopup">
  <button class="sp-note" onclick="noteFromSelection()">💬 Note</button>
  <button class="sp-hl" onclick="highlightSelection()">🖍 Highlight</button>
  <button class="sp-copy" onclick="copySelection()">📋 Copy</button>
</div>
<button class="comment-fab" id="commentFab" onclick="scrollToComments()" title="Notes & Comments">💬<span class="comment-fab-badge" id="commentFabBadge" style="display:none;">0</span></button>
<canvas id="confetti-canvas"></canvas>
<aside class="toc-panel" id="tocPanel">
  <h3>On this page</h3>
  <div id="tocLinks"></div>
</aside>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="js/data/quizzes.js"></script>
<script src="js/data/dsa_problems.js"></script>
<!-- App modules — load order matters (state defines globals used by later files) -->
<script src="js/state.js"></script>
<script src="js/chapter.js"></script>
<script src="js/pages.js"></script>
<script src="js/dsa.js"></script>
<script src="js/init.js"></script>
</body>
</html>
